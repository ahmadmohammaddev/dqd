version: "3.8"

services:
  # ── Laravel Application ──────────────────────────────────
  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: quranic_diamond_app
    restart: unless-stopped
    ports:
      - "8080:80"
    environment:
      - APP_ENV=production
      - APP_DEBUG=false
      - APP_KEY=${APP_KEY}
      - APP_URL=http://localhost:8080
      - DB_CONNECTION=mysql
      - DB_HOST=db
      - DB_PORT=3306
      - DB_DATABASE=goldendatabase
      - DB_USERNAME=laravel_user
      - DB_PASSWORD=secret_password
    depends_on:
      db:
        condition: service_healthy
    networks:
      - quranic_net
    volumes:
      - app_storage:/var/www/html/storage

  # ── MySQL Database ───────────────────────────────────────
  db:
    image: mysql:8.0
    container_name: quranic_diamond_db
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root_password
      MYSQL_DATABASE: goldendatabase
      MYSQL_USER: laravel_user
      MYSQL_PASSWORD: secret_password
    ports:
      - "3307:3306"
    volumes:
      - db_data:/var/lib/mysql
    networks:
      - quranic_net
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-proot_password"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

volumes:
  db_data:
    driver: local
  app_storage:
    driver: local

networks:
  quranic_net:
    driver: bridge
